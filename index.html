<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitiya Poomiphated</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#2c2418;}
body{
  min-height:100vh;position:relative;isolation:isolate;
  background:radial-gradient(ellipse 70% 60% at 32% 18%, #4a3f2c 0%, #342c1d 55%, #221b12 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  padding:60px 24px;overflow-x:hidden;
}
/* very light grain, kept subtle so the flat warm background still reads clean */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

/* HERO LAYOUT — phone on the left, bio panel on the right, like raffi.town */
.hero{
  display:flex;align-items:center;justify-content:center;gap:52px;
  max-width:1080px;width:100%;flex-wrap:wrap;position:relative;z-index:2;
}
.phone{flex-shrink:0;}
.bio{max-width:380px;flex:1 1 280px;color:#fff;}
.bio h1{font-size:30px;font-weight:700;letter-spacing:-.3px;margin-bottom:22px;}
.bio p{font-size:16px;line-height:1.75;color:rgba(255,255,255,.62);margin-bottom:18px;}
.bio p b{color:#fff;font-weight:700;}
.type-wrap{min-height:150px;outline:none;border-radius:10px;transition:box-shadow .2s;}
.type-wrap[contenteditable="true"]{cursor:text;}
.type-wrap[contenteditable="true"]:hover{box-shadow:0 0 0 6px rgba(255,255,255,.04);}
.type-wrap[contenteditable="true"]:focus{box-shadow:0 0 0 6px rgba(255,255,255,.07);}

/* generic "click to edit" affordance used across the whole page */
[data-ek]{outline:none;border-radius:6px;transition:box-shadow .15s;}
[data-ek]:hover{box-shadow:0 0 0 5px rgba(0,0,0,.22);cursor:text;}
[data-ek]:focus{box-shadow:0 0 0 5px rgba(0,0,0,.3);cursor:text;}
.bio [data-ek]:hover,.bio [data-ek]:focus{box-shadow:0 0 0 5px rgba(255,255,255,.08);}
.type-line{font-size:16px;line-height:1.75;color:rgba(255,255,255,.72);margin-bottom:18px;}
.type-cursor{display:inline-block;width:2px;height:1em;background:rgba(255,255,255,.85);
  margin-left:2px;vertical-align:-2px;animation:typeBlink .9s steps(1) infinite;}
@keyframes typeBlink{0%,50%{opacity:1;}50.01%,100%{opacity:0;}}
.bio-edit-hint{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px;margin-bottom:20px;
  display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .3s;}
.bio-edit-hint.show{opacity:1;}
.bio-social{display:flex;gap:14px;margin-top:34px;}
.bio-social a{
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.68);text-decoration:none;transition:all .2s ease;
}
.bio-social a svg{width:17px;height:17px;}
.bio-social a:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.4);transform:translateY(-2px);}

/* PHONE */
.phone{
  width:393px;
  background:linear-gradient(175deg,#26221c 0%,#1a1712 50%,#100e0b 100%);
  border-radius:52px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.1),0 0 0 11px #1c1c1e,0 0 0 12.5px #3a3a3c,
             0 50px 110px rgba(0,0,0,0.55),0 4px 0 rgba(255,255,255,0.03) inset;
  overflow:hidden;position:relative;
  padding:58px 24px 28px;
  min-height:790px;display:flex;flex-direction:column;
  animation:phoneAppear .8s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes phoneAppear{
  0%{opacity:0;transform:translateY(24px) scale(.97);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}

/* DYNAMIC ISLAND */
.island{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;
  background:#000;border-radius:20px;z-index:10;
  display:flex;align-items:center;justify-content:flex-end;padding-right:10px;gap:6px;
}
.island-cam{width:12px;height:12px;background:#1a1a1a;border-radius:50%;border:1.5px solid #2a2a2a;}

/* STATUS */
.status{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 6px;margin-bottom:18px;
  font-size:15px;font-weight:700;color:#fff;
}
.status-left{display:flex;align-items:center;gap:5px;}
.status-right{display:flex;align-items:center;gap:5px;font-size:12px;}
.stext{font-weight:600;font-size:13px;color:#fff;}
.batt-pill{
  background:#30D158;color:#0a2b12;font-size:11px;font-weight:800;
  border-radius:9px;padding:2px 6px 2px;line-height:1.2;letter-spacing:-.2px;
}

/* WALLPAPER ELEMENTS */
.wp-circle{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;}

/* DATE & NAME */
.greeting{text-align:center;margin-bottom:28px;position:relative;z-index:1;}
.greeting-date{font-size:14px;color:rgba(255,255,255,0.55);font-weight:400;margin-bottom:2px;}
.greeting-name{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.greeting-role{font-size:13px;color:rgba(255,255,255,0.5);margin-top:1px;}

/* APP GRID */
.app-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:20px 8px;padding:0 2px;flex:1;position:relative;z-index:1;
}
.app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.app-icon{
  width:66px;height:66px;border-radius:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.25);
  transition:transform .18s cubic-bezier(0.34,1.56,0.64,1), box-shadow .18s ease;
  overflow:hidden;flex-shrink:0;position:relative;
}
@keyframes tapBounce{
  0%{transform:scale(1);}
  35%{transform:scale(.82);}
  65%{transform:scale(1.14);}
  85%{transform:scale(.96);}
  100%{transform:scale(1);}
}
.app-icon.bounce-tap{animation:tapBounce .42s cubic-bezier(0.34,1.56,0.64,1);}
.app-icon::after{
  content:'';position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(to bottom,rgba(255,255,255,0.22),transparent);
  border-radius:17px 17px 0 0;pointer-events:none;z-index:2;
}
.app:hover .app-icon{
  transform:scale(1.18) translateY(-4px);
  box-shadow:0 12px 28px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.3);
}
.app:active .app-icon{
  transform:scale(0.88);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  transition:transform .08s ease;
}
/* shine sweep across the icon on hover, raffi.town style */
.app-icon .shine{
  position:absolute;top:0;left:-60%;width:40%;height:100%;z-index:3;pointer-events:none;
  background:linear-gradient(75deg,transparent,rgba(255,255,255,0.55),transparent);
  transform:skewX(-18deg);transition:left .6s ease;
}
.app:hover .app-icon .shine{left:130%;}

/* stagger fade-up entrance for grid + dock icons */
.app-grid .app, .dock .app{opacity:0;transform:translateY(14px);
  animation:appIn .55s cubic-bezier(0.22,1,0.36,1) both;}
.app-grid .app:nth-child(1){animation-delay:.5s;} .app-grid .app:nth-child(2){animation-delay:.58s;}
.app-grid .app:nth-child(3){animation-delay:.66s;} .app-grid .app:nth-child(4){animation-delay:.74s;}
.app-grid .app:nth-child(5){animation-delay:.82s;} .app-grid .app:nth-child(6){animation-delay:.9s;}
.app-grid .app:nth-child(7){animation-delay:.98s;} .app-grid .app:nth-child(8){animation-delay:1.06s;}
.app-grid .app:nth-child(9){animation-delay:1.14s;} .app-grid .app:nth-child(10){animation-delay:1.22s;}
.dock .app:nth-child(1){animation-delay:1.32s;} .dock .app:nth-child(2){animation-delay:1.38s;}
.dock .app:nth-child(3){animation-delay:1.44s;}
@keyframes appIn{
  0%{opacity:0;transform:translateY(14px);}
  100%{opacity:1;transform:translateY(0);}
}
.greeting{animation:appIn .6s cubic-bezier(0.22,1,0.36,1) .3s both;}
.page-info{animation:appIn .6s cubic-bezier(0.22,1,0.36,1) 1.3s both;}

/* preview image inside icon */
.icon-preview{
  position:absolute;inset:0;z-index:1;
  display:grid;gap:1px;
}
.icon-preview.count-1 img{width:100%;height:100%;object-fit:cover;display:block;}
.icon-preview.count-2{grid-template-columns:1fr 1fr;}
.icon-preview.count-2 img{width:100%;height:100%;object-fit:cover;display:block;}
.icon-preview.count-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.icon-preview.count-3 img:first-child{grid-row:span 2;}
.icon-preview.count-3 img{width:100%;height:100%;object-fit:cover;display:block;}
.icon-preview.count-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.icon-preview.count-4 img{width:100%;height:100%;object-fit:cover;display:block;}
/* overlay gradient on preview */
.icon-preview::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.08),rgba(0,0,0,0.25));
  pointer-events:none;
}
.app-label{font-size:11px;color:#fff;font-weight:500;text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);line-height:1.2;letter-spacing:.01em;}

/* WIDGETS (GitHub / Spotify style, span 2 columns) */
.app-widget{grid-column:span 2;}
.widget-icon{width:100%;height:auto;aspect-ratio:1/0.86;border-radius:22px;position:relative;padding:0;}
.gh-grid{padding:14px;box-sizing:border-box;}
.sp-logo{position:absolute;top:10px;right:10px;}
.sp-text{position:absolute;left:12px;bottom:12px;right:40px;}
.sp-title{color:#fff;font-size:13px;font-weight:700;line-height:1.25;}
.sp-sub{color:rgba(255,255,255,0.65);font-size:11px;margin-top:2px;}
.sp-play{position:absolute;right:10px;bottom:10px;width:26px;height:26px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;padding-left:2px;}

/* FOLDERS (2x2 mini-icon grid inside a frosted dark square) */
.folder-icon{
  width:66px;height:66px;border-radius:17px;
  background:rgba(70,70,74,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;
  padding:7px;box-shadow:0 4px 14px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.12);
  transition:transform .18s cubic-bezier(0.34,1.56,0.64,1);
}
.folder-icon span{border-radius:6px;display:block;}
.app:hover .folder-icon{transform:scale(1.14) translateY(-4px);}
.app:active .folder-icon{transform:scale(.88);}
.app-label-icon{width:22px;height:22px;border-radius:6px;margin:0 auto;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 5px rgba(0,0,0,.4);}
.app-label-icon svg{display:block;}

/* SEARCH PILL */
.search-pill{
  align-self:center;margin:18px auto 0;
  background:rgba(120,120,128,0.32);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:rgba(255,255,255,0.85);font-size:13px;font-weight:500;
  padding:9px 22px;border-radius:20px;display:flex;align-items:center;gap:6px;
  width:fit-content;position:relative;z-index:1;
}

/* DOCK */
.dock{
  margin-top:22px;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:30px;padding:14px 20px;
  display:flex;justify-content:space-around;
  border:1px solid rgba(255,255,255,0.12);position:relative;z-index:1;
}
.dock .app-icon{width:58px;height:58px;border-radius:15px;}
.dock .app:hover .app-icon{transform:scale(1.15) translateY(-4px);}
.dock .app:active .app-icon{transform:scale(0.88);}

/* MODAL */
.ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0);z-index:200;
  align-items:flex-end;justify-content:center;
  transition:background .3s;
}
.ov.open{display:flex;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.app-window{
  background:#f2f2f7;
  border-radius:32px 32px 0 0;
  width:100%;max-width:480px;max-height:92vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .42s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -6px 50px rgba(0,0,0,0.28);
}
.ov.open .app-window{transform:translateY(0);}

/* WIN HEADER */
.win-header{
  padding:10px 20px 0;display:flex;flex-direction:column;align-items:center;
  background:#f2f2f7;position:sticky;top:0;z-index:10;
}
.win-handle{width:36px;height:5px;background:#c7c7cc;border-radius:3px;margin-bottom:14px;}
.win-title-row{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding-bottom:12px;border-bottom:1px solid rgba(0,0,0,0.08);margin-bottom:2px;
}
.win-icon-sm{
  width:40px;height:40px;border-radius:11px;overflow:hidden;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.18);
}
.win-icon-sm svg{width:100%;height:100%;}
.win-title{font-size:17px;font-weight:700;color:#1c1c1e;flex:1;padding:0 12px;}
.win-close{
  width:30px;height:30px;border-radius:50%;background:#e5e5ea;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#636366;
  transition:background .15s;flex-shrink:0;
}
.win-close:hover{background:#d1d1d6;}

/* WIN BODY */
.win-body{overflow-y:auto;padding:14px 16px 32px;flex:1;}

/* CAMERA DEVICE MODAL — physical camera look for the intro video */
.cam-ov{align-items:center;}
.cam-device{
  position:relative;width:320px;max-width:88vw;
  background:linear-gradient(160deg,#4a4a4d 0%,#2c2c2e 55%,#1c1c1e 100%);
  border-radius:46px;padding:24px 18px;
  box-shadow:0 30px 90px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06);
  transform:translateY(30px) scale(.95);opacity:0;
  transition:transform .38s cubic-bezier(0.32,0.72,0,1),opacity .3s ease;
}
.ov.open .cam-device{transform:translateY(0) scale(1);opacity:1;}
.cam-close{
  position:absolute;top:-14px;right:-10px;width:32px;height:32px;border-radius:50%;
  background:#1c1c1e;color:#fff;border:2px solid rgba(255,255,255,.15);
  cursor:pointer;font-size:13px;z-index:5;
}
.cam-notch{width:110px;height:16px;background:#0e0e0f;border-radius:10px;margin:0 auto 18px;}
.cam-toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;}
.cam-round-btn{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(160deg,#565659,#2c2c2e);border:none;color:#eee;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.18),0 3px 6px rgba(0,0,0,.4);cursor:pointer;
}
.cam-round-btn.big{width:60px;height:60px;font-size:17px;}
.cam-dial-fluted{
  flex:1;height:58px;border-radius:20px;
  background:repeating-linear-gradient(90deg,#57575a 0px,#57575a 2px,#2a2a2c 2px,#2a2a2c 5px);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.45),0 3px 6px rgba(0,0,0,.35);
}
.cam-viewfinder{
  position:relative;border-radius:26px;overflow:hidden;background:#050506;
  aspect-ratio:9/13;margin-bottom:16px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}
.cam-viewfinder video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-vf-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:rgba(255,255,255,.55);font-size:13px;line-height:1.6;text-align:center;padding:20px;
}
.cam-vf-emoji{font-size:36px;}
.cam-botrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cam-1x{
  width:54px;height:32px;border-radius:16px;background:#101011;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.6);
}
.cam-1x .dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.5;}
.cam-shutter{
  width:70px;height:70px;border-radius:50%;flex-shrink:0;border:none;cursor:pointer;
  background:radial-gradient(circle at 35% 30%,#fff,#dcdcde 45%,#a9a9ac 100%);
  box-shadow:0 6px 16px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  transition:transform .15s ease;
}
.cam-shutter:active{transform:scale(.9);}
.cam-shutter .plus{font-size:26px;color:#333;font-weight:300;}

/* CARDS */
.c-label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px 4px;}
.c-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:4px;}
.c-item{padding:13px 16px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;}
.c-item:last-child{border-bottom:none;}
.c-icon{font-size:22px;width:30px;text-align:center;flex-shrink:0;}
.c-info{flex:1;min-width:0;}
.c-title{font-size:15px;font-weight:500;color:#1c1c1e;}
.c-sub{font-size:13px;color:#8e8e93;margin-top:1px;}
.c-arr{color:#c7c7cc;font-size:16px;flex-shrink:0;}

/* SEG */
.seg{display:flex;background:#e5e5ea;border-radius:10px;padding:2px;margin-bottom:14px;}
.seg-btn{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;color:#8e8e93;cursor:pointer;transition:all .18s;font-family:inherit;}
.seg-btn.on{background:#fff;color:#1c1c1e;box-shadow:0 1px 4px rgba(0,0,0,0.1);}

/* UPLOAD */
.drop-z{
  background:#fff;border-radius:16px;border:1.5px dashed #d1d1d6;
  padding:28px 16px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:14px;
}
.drop-z:hover,.drop-z.drag{border-color:#007AFF;background:#f0f7ff;}
.drop-z-icon{font-size:34px;margin-bottom:8px;}
.drop-z-title{font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:3px;}
.drop-z-sub{font-size:13px;color:#8e8e93;margin-bottom:14px;}
.ios-btn{
  display:inline-block;padding:10px 24px;
  background:#007AFF;color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;
}
.ios-btn:hover{background:#0066DD;}
.ios-btn.red{background:#FF3B30;} .ios-btn.red:hover{background:#CC2020;}
.ios-btn.full{display:block;width:100%;padding:14px;border-radius:14px;font-size:16px;margin-top:10px;}

/* MEDIA */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:12px;overflow:hidden;}
.img-cell{aspect-ratio:1;position:relative;overflow:hidden;background:#f2f2f7;}
.img-cell img{width:100%;height:100%;object-fit:cover;display:block;}
.img-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,0.65);color:#fff;border:none;cursor:pointer;font-size:10px;
  display:none;align-items:center;justify-content:center;}
.img-cell:hover .img-del{display:flex;}
.pdf-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(0,0,0,0.06);}
.pdf-row:last-child{border-bottom:none;}
.pdf-name{flex:1;font-size:14px;font-weight:500;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdf-sz{font-size:11px;color:#8e8e93;}
.pdf-a{color:#007AFF;font-size:13px;font-weight:500;text-decoration:none;}
.pdf-del{background:none;border:none;cursor:pointer;color:#ff3b30;font-size:15px;}
.pdf-frame{width:100%;min-height:420px;border:none;display:flex;align-items:center;justify-content:center;background:#e9e9ee;overflow:auto;}
.pdf-frame canvas{width:100%;height:auto;display:block;}
.pdf-loading{font-size:13px;color:#8e8e93;padding:40px 0;}
.vid-row{display:flex;gap:8px;margin-bottom:12px;}
.vid-in{flex:1;padding:12px 13px;background:#fff;border:1px solid #e5e5ea;border-radius:12px;
  font-size:14px;color:#1c1c1e;outline:none;font-family:inherit;transition:border-color .2s;}
.vid-in:focus{border-color:#007AFF;}
.vid-in::placeholder{color:#c7c7cc;}
.vid-add{padding:12px 18px;background:#007AFF;color:#fff;border:none;border-radius:12px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.vid-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;display:block;margin-bottom:10px;background:#000;}
.vid-link{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border-radius:12px;
  text-decoration:none;color:#1c1c1e;margin-bottom:10px;border:1px solid #e5e5ea;}
.vid-del{display:block;width:100%;padding:8px;background:none;border:1px solid #ffd0ce;
  color:#ff3b30;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:12px;font-family:inherit;}
.note-ta{width:100%;min-height:160px;background:#fff;border:1px solid #e5e5ea;border-radius:16px;
  padding:14px;font-size:15px;line-height:1.6;color:#1c1c1e;resize:none;outline:none;
  font-family:inherit;transition:border-color .2s;}
.note-ta:focus{border-color:#007AFF;}
.note-ta::placeholder{color:#c7c7cc;}
.note-ok{text-align:center;font-size:13px;color:#34c759;margin-top:8px;height:18px;}
.empty{text-align:center;padding:36px 20px;color:#c7c7cc;}
.empty-i{font-size:42px;margin-bottom:8px;}
.about-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;box-shadow:0 4px 16px rgba(0,0,0,0.12);overflow:hidden;}
.about-av svg{width:100%;height:100%;}
.about-nm{font-size:22px;font-weight:700;color:#1c1c1e;text-align:center;}
.about-rl{font-size:14px;color:#8e8e93;text-align:center;margin-top:2px;}

/* outside */
.page-info{margin-top:24px;text-align:center;}
.page-info-n{font-size:15px;font-weight:600;color:#3a3a3c;}
.page-info-s{font-size:13px;color:#8e8e93;margin-top:2px;}

@media(max-width:760px){
  .hero{flex-direction:column;gap:36px;}
  .bio{text-align:center;max-width:393px;}
  .bio-social{justify-content:center;}
}
@media(max-width:440px){
  body{padding:0;align-items:flex-end;}
  .hero{width:100%;}
  .phone{width:100vw;border-radius:44px 44px 0 0;min-height:100vh;}
  .app-window{border-radius:24px 24px 0 0;max-height:95vh;}
  .bio{display:none;}
}

<script>
// ADMIN mode: only the site owner, visiting with ?edit=fern2026 in the URL,
// sees upload/delete/edit controls. Everyone else just sees finished content.
const ADMIN=new URLSearchParams(location.search).get('edit')==='fern2026';
// clock
function tick(){
  const n=new Date(),h=n.getHours().toString().padStart(2,'0'),m=n.getMinutes().toString().padStart(2,'0');
  document.getElementById('clk').textContent=h+':'+m;
  const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('grdate').textContent=`วัน${days[n.getDay()]}ที่ ${n.getDate()} ${months[n.getMonth()]}`;
}
tick(); setInterval(tick,30000);

// typewriter effect for the bio text on the right, like raffi.town —
// once typed (or once restored from a previous edit) the text becomes
// directly editable: click into it, type your own words, done.
const TYPE_LINES=[
  "The thing I open most isn't my chats—it's a new tab.",
  "Because you never know when a good idea will show up.",
  "Hopefully, this portfolio will leave you smiling when you close this tab."
];
const BIO_KEY='portfolio_about_me_html';
function safeGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

// generic "edit everything" system — any element with data-ek becomes
// click-to-edit text, remembered per key in localStorage
function bindEditableFields(container){
  container.querySelectorAll('[data-ek]').forEach(el=>{
    if(el.dataset.ekBound)return; // avoid double-binding the same node
    el.dataset.ekBound='1';
    const key='edit_'+el.getAttribute('data-ek');
    const saved=safeGet(key);
    if(saved!==null)el.textContent=saved;
    if(!ADMIN)return; // visitors: show saved text only, no editing UI
    el.setAttribute('contenteditable','true');

    safeSet(BIO_KEY,JSON.stringify(lines.length?lines:TYPE_LINES));

function typeBio(lines){
  const wrap=document.getElementById('typeWrap');
  if(!wrap)return;
  wrap.innerHTML='';
  let li=0;
  function nextLine(){
    if(li>=lines.length){enableBioEdit(wrap);safeSet(BIO_KEY,JSON.stringify(lines));return;}
    const p=document.createElement('p');
    p.className='type-line';
    const cursor=document.createElement('span');
    cursor.className='type-cursor';
    wrap.appendChild(p);
    const text=lines[li];
    let ci=0;
    (function typeChar(){
      if(ci<text.length){
        p.textContent=text.slice(0,ci+1);
        p.appendChild(cursor);
        ci++;
        setTimeout(typeChar,16+Math.random()*26);
      }else{
        cursor.remove();
        li++;
        setTimeout(nextLine,420);
      }
    })();
  }
  nextLine();
}

})();

async function renderPdfPreview(el){
  const dataUrl=el.getAttribute('data-pdf');
  if(!dataUrl||!window.pdfjsLib)return;
  try{
    const base64=dataUrl.split(',')[1];
    const bin=atob(base64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const pdf=await pdfjsLib.getDocument({data:bytes}).promise;
    const page=await pdf.getPage(1);
    const baseVp=page.getViewport({scale:1});
    const targetW=el.clientWidth||340;
    const scale=targetW/baseVp.width;
    const vp=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    el.innerHTML='';
    el.appendChild(canvas);
  }catch(err){
    el.innerHTML='<div class="pdf-loading">ไม่สามารถแสดงตัวอย่าง PDF ได้</div>';
  }
}
function mountPdfPreviews(container){

// file handlers
function doFile(e,id,type){[...e.target.files].forEach(f=>readF(f,id,type));e.target.value='';}
function doDrop(e,id,type){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  const filter=type==='img'?f=>f.type.startsWith('image/'):type==='clip'?f=>f.type.startsWith('video/'):f=>f.type==='application/pdf';
  [...e.dataTransfer.files].filter(filter).forEach(f=>readF(f,id,type));
}
function readF(f,id,type){
  const r=new FileReader();
  r.onload=ev=>{
    if(type==='img')db(id).images.push({name:f.name,src:ev.target.result});
    else if(type==='clip')db(id).clips.push({name:f.name,size:f.size,src:ev.target.result});
    else db(id).pdfs.push({name:f.name,size:f.size,src:ev.target.result});
    saveDB();
  };
  r.readAsDataURL(f);
}
function addVid(id){
  const el=document.getElementById(`vu-${id}`);
  const url=el?.value.trim();if(!url)return;
  db(id).videos.push(url);if(el)el.value='';
  saveDB();
}
function saveNote(id){
  const ta=document.getElementById(`nt-${id}`);
  if(ta)db(id).note=ta.value;
  saveDB();
  const ok=document.getElementById(`nok-${id}`);
  if(ok){ok.textContent='✓ บันทึกแล้ว';setTimeout(()=>ok.textContent='',2000);}
}
function delItem(id,type,i){
  if(type==='img')db(id).images.splice(i,1);
  else if(type==='pdf')db(id).pdfs.splice(i,1);
  else if(type==='clip')db(id).clips.splice(i,1);
  else db(id).videos.splice(i,1);
  saveDB();
  openApp(id);
}
